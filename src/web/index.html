<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempik</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%238185f8'/%3E%3Cstop offset='100%25' style='stop-color:%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='46' font-family='Inter,sans-serif' font-size='36' font-weight='700' fill='white' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1 id="appTitle">Tempik</h1>
        <p id="appSubtitle">Disposable inbox</p>
      </header>

      <section class="toolbar">
        <select id="inboxSelect"></select>
        <button id="copyBtn">📋 Copy</button>
        <button id="refreshBtn">🔄 Refresh</button>
        <button id="newBtn">＋ New</button>
        <button id="deleteBtn" class="danger">🗑 Delete</button>
      </section>

      <section class="new-box hidden" id="newBox">
        <input id="localPartInput" placeholder="username atau kosongkan untuk random" />
        <button id="createCustomBtn">✦ Create</button>
        <button id="createRandomBtn">🎲 Random</button>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="currentInbox">No inbox selected</h2>
          <span id="messageCount">0 messages</span>
        </div>
        <div id="messageList" class="message-list"></div>
      </section>

      <footer>
        <a href="https://github.com/hirotomasato" target="_blank" rel="noopener">
          Developer by <span>masantoid</span>
        </a>
      </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/app.js"></script>
  </body>
</html>
